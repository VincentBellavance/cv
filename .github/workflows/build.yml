name: Build and deploy RMarkdown CV

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 5 1,15 * *'

# Important : donne les permissions pour écrire sur la branche gh-pages
permissions:
  contents: write

jobs:
  Build_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: '2.19'

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.2.2'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10.9'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libicu-dev \
            libpoppler-cpp-dev \
            libglu1-mesa-dev \
            libmagick++-dev \
            ghostscript

      - name: Install R packages
        run: |
          # Installation de pak pour une gestion robuste des dépendances
          install.packages("pak")
          # pak installe les dépendances système manquantes et gère mieux les arbres complexes
          pak::pkg_install(c('glue', 'tidyverse', 'readr', 'rmarkdown', 'pagedown', 'rorcid', 'rcrossref'))
        shell: Rscript {0}

      - name: Install pandoc filters
        run: |
          python -m pip install --upgrade pip
          pip install pandoc-fignos pandoc-eqnos pandoc-tablenos pandoc-secnos pandoc-xnos

      - name: Build html
        env:
          ORCID_TOKEN: ${{ secrets.ORCID_TOKEN }}
        run: |
          rmarkdown::render('index.Rmd')
        shell: Rscript {0}

      - name: Build pdf
        run: |
          pagedown::chrome_print(input = 'index.html', output = 'index.pdf', wait = 10)
        shell: Rscript {0}

      - name: Prepare deployment
        run: |
          mkdir -p docs
          mv index.html docs/index.html
          # On vérifie si le PDF existe avant de le déplacer pour éviter une erreur
          [ -f index.pdf ] && mv index.pdf docs/VincentBellavance.pdf

      - name: Deploy gh_pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          single-commit: true